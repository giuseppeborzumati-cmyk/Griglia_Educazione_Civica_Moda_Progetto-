<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Valutazione - Sistema Moda</title>
    <!-- Tailwind CSS per l'interfaccia utente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF per la generazione del PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- jsPDF AutoTable per le griglie dettagliate -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fashion-gradient { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="fashion-gradient text-white p-8 text-center">
            <h1 class="text-3xl font-light tracking-widest uppercase mb-2">Generatore Dossier di Valutazione</h1>
            <h2 class="text-sm tracking-widest opacity-80">Progetto Educazione Civica e Informatica - Sistema Moda</h2>
            <p class="mt-4 text-sm font-light">IT SG Primo Levi, Seregno - A.S. 2025/2026</p>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <!-- Colonna Sinistra: Selezione Dati -->
                <div class="space-y-6">
                    <h3 class="text-xl border-b pb-2 font-semibold text-gray-800">1. Dati Anagrafici e Gruppo</h3>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Carica Logo Scuola/Azienda (Opzionale)</label>
                        <input type="file" id="logoUpload" accept="image/png, image/jpeg" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Classe</label>
                        <select id="classeSelect" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" onchange="updateGruppi()">
                            <option value="">Seleziona una classe...</option>
                            <option value="1A">1A - Sistema Moda</option>
                            <option value="1B">1B - Sistema Moda</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Azienda (Gruppo)</label>
                        <select id="gruppoSelect" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" onchange="updateStudenti()" disabled>
                            <option value="">Seleziona prima la classe...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Alunna</label>
                        <select id="studenteSelect" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" disabled>
                            <option value="">Seleziona prima il gruppo...</option>
                        </select>
                    </div>
                </div>

                <!-- Colonna Destra: Inserimento Voti -->
                <div class="space-y-6">
                    <h3 class="text-xl border-b pb-2 font-semibold text-gray-800">2. Inserimento Voti (1-10)</h3>
                    <p class="text-xs text-gray-500 mb-4">Inserire i punteggi. Il PDF genererà le griglie analitiche e la conversione finale in automatico.</p>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ed. Civica (Privacy/Virus)</label>
                            <input type="number" id="votoCivica" min="1" max="10" step="0.1" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" placeholder="Es. 8.5">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Elaborazione Testi (Word)</label>
                            <input type="number" id="votoWord" min="1" max="10" step="0.1" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" placeholder="Es. 7.5">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Foglio di Calcolo (Excel)</label>
                            <input type="number" id="votoExcel" min="1" max="10" step="0.1" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" placeholder="Es. 9.0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Presentazione (PowerPoint)</label>
                            <input type="number" id="votoPPT" min="1" max="10" step="0.1" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" placeholder="Es. 8.0">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Web Design (Google Sites)</label>
                            <input type="number" id="votoSites" min="1" max="10" step="0.1" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black p-2 border" placeholder="Es. 10">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-10 text-center border-t pt-8">
                <button onclick="generaPDF()" class="bg-black text-white px-8 py-3 rounded-md font-semibold tracking-widest uppercase hover:bg-gray-800 transition shadow-lg w-full md:w-auto">
                    Genera Dossier PDF Dettagliato
                </button>
            </div>
        </div>
    </div>

    <script>
        // Database dei progetti
        const db = {
            "1A": {
                "Vousier Milano": {
                    slogan: "Perfettamente Imperfette",
                    mission: "Rifinire il concetto di avanguardia attraverso la fusione tra design biomimetico e tecnologia circolare, creando capi vissuti come seconda pelle etica.",
                    client: "Donne alla ricerca di unicità ed etica, ispirate al 'Kintsugi Wear'.",
                    membri: ["SOFIA LAFAUCI", "CLAUDIA NAVA", "MELISSA GIANNATTASIO", "ANDREA LAUDATO", "GIULIA MECOZZI", "NOEMI MEREGALLI", "MARTINA RIGAMONTI", "SOFIA ALESSI"]
                },
                "Rêve Couture": {
                    slogan: "L’eleganza che sogna",
                    mission: "Riproporre i capi del primo novecento e adattarli agli abiti odierni per un'eleganza senza tempo.",
                    client: "Audrey, 27 anni, Stylist. Cerca alta qualità e design stravagante.",
                    membri: ["GIULIA PIROZZOLO", "MATILDE FABRIZIO", "SARA DE CILLIS", "CHIARA LECCHINI", "MATILDE RAVASI", "ANITA CASATI", "SOFIA BARBONETTI"]
                },
                "Palmiera": {
                    slogan: "Dove il comfort incontra l'eleganza",
                    mission: "Creare moda estiva che trasmetta leggerezza e libertà, con capi versatili ed economici per fisicità diverse.",
                    client: "Clientela giovane e dinamica in cerca di abiti estivi confortevoli, economici ma alla moda.",
                    membri: ["GIULIA ARNEMI", "NOOR BOKHARI", "ANA CHELARIU", "SOFIA DAWOUD", "MARIAM ELSIRI", "DUA HAIDER", "FRANCESCA SALINITRO"]
                }
            },
            "1B": {
                "Midnight": {
                    slogan: "L’eleganza è magia.",
                    mission: "Rendere le persone eleganti nel freddo periodo invernale (settembre-marzo) garantendo qualità ed eleganza.",
                    client: "Roberta, 29 anni, Imprenditrice. Partecipa a feste informali e predilige qualità estrema.",
                    membri: ["SARA STAGNO", "LIDIA BOSEGGIA", "ADAN CHEEMA", "KRISTEL CIOFFI", "AURORA MANZONI", "GIADA TAGLIABUE", "AURORA ZAPPINO"]
                },
                "Gramaaj": {
                    slogan: "Stile senza filtri, libertà da indossare",
                    mission: "Far sentire ogni persona autentica e a suo agio, offrendo capi streetwear unici.",
                    client: "Peter, 26 anni, giocatore di hockey. Ama vestirsi bene con design stravaganti.",
                    membri: ["RIHANNA BEKSHIU", "ALICE GIOIA", "GIORGIA BENZI", "ADHARA BOTTAN", "AGNESE GHEZZI", "HERNANDEZ PEREZ JEIMY GRISELDA", "MARIAM NIASSE"]
                },
                "Shinegold": {
                    slogan: "Shine every summer moment!",
                    mission: "Valorizzare l’unicità di ogni persona attraverso abiti eleganti estivi che esaltano la luce interiore.",
                    client: "Alessia, 20 anni, Attrice. Apprezza materiali magici ed eleganza giovanile.",
                    membri: ["ILARIA COLICO", "SARA RAFFAELE", "SARA BELLONI", "GINEVRA CARNELLI", "CHIARA NEGRI", "ALICE PARENTE", "CRISTEL RAHMANAJ"]
                }
            }
        };

        // Gestione Immagine Logo
        let logoBase64 = null;
        document.getElementById('logoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                logoBase64 = reader.result;
            }
            if (file) {
                reader.readAsDataURL(file);
            }
        });

        function updateGruppi() {
            const classe = document.getElementById('classeSelect').value;
            const gruppoSelect = document.getElementById('gruppoSelect');
            const studenteSelect = document.getElementById('studenteSelect');
            
            gruppoSelect.innerHTML = '<option value="">Seleziona l\'azienda...</option>';
            studenteSelect.innerHTML = '<option value="">Seleziona prima il gruppo...</option>';
            studenteSelect.disabled = true;

            if (classe) {
                const gruppi = Object.keys(db[classe]);
                gruppi.forEach(gruppo => {
                    gruppoSelect.innerHTML += `<option value="${gruppo}">${gruppo}</option>`;
                });
                gruppoSelect.disabled = false;
            } else {
                gruppoSelect.disabled = true;
            }
        }

        function updateStudenti() {
            const classe = document.getElementById('classeSelect').value;
            const gruppo = document.getElementById('gruppoSelect').value;
            const studenteSelect = document.getElementById('studenteSelect');

            studenteSelect.innerHTML = '<option value="">Seleziona l\'alunna...</option>';

            if (classe && gruppo) {
                const studenti = db[classe][gruppo].membri.sort();
                studenti.forEach(studente => {
                    studenteSelect.innerHTML += `<option value="${studente}">${studente}</option>`;
                });
                studenteSelect.disabled = false;
            } else {
                studenteSelect.disabled = true;
            }
        }

        function calcolaFascia(voto) {
            const p = parseFloat(voto);
            if (p < 3.70) return 3;
            if (p >= 3.70 && p < 4.70) return 4;
            if (p >= 4.70 && p < 5.70) return 5;
            if (p >= 5.70 && p < 6.70) return 6;
            if (p >= 6.70 && p < 7.70) return 7;
            if (p >= 7.70 && p < 8.70) return 8;
            if (p >= 8.70 && p < 9.70) return 9;
            if (p >= 9.70) return 10;
            return 0;
        }

        function generaPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            const classe = document.getElementById('classeSelect').value;
            const gruppo = document.getElementById('gruppoSelect').value;
            const studente = document.getElementById('studenteSelect').value;
            
            const vCivica = document.getElementById('votoCivica').value || 0;
            const vWord = document.getElementById('votoWord').value || 0;
            const vExcel = document.getElementById('votoExcel').value || 0;
            const vPPT = document.getElementById('votoPPT').value || 0;
            const vSites = document.getElementById('votoSites').value || 0;

            if (!studente) {
                alert("Per favore, seleziona una classe, un gruppo e un'alunna.");
                return;
            }

            const datiGruppo = db[classe][gruppo];
            
            // Colori tema
            const mainColor = [44, 62, 80]; // Dark slate
            const accentColor = [150, 150, 150]; // Gray

            // --- INTESTAZIONE PAGINA 1 ---
            if (logoBase64) {
                doc.addImage(logoBase64, 'JPEG', 15, 15, 30, 30);
            } else {
                doc.setDrawColor(0);
                doc.rect(15, 15, 30, 30);
                doc.setFontSize(8);
                doc.text("LOGO", 25, 30);
            }

            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("I.T. SG PRIMO LEVI - SEREGNO", 50, 22);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("Via Briantina 68, Seregno (MB)", 50, 28);
            doc.text("A.S. 2025/2026", 50, 34);
            doc.text("Docenti: Prof. G. Borzumati (Teoria) | Prof.ssa R. Anzalone (ITP Lab.)", 50, 40);

            doc.setLineWidth(0.5);
            doc.line(15, 50, 195, 50);

            // --- DETTAGLI STUDENTE E PROGETTO ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text("DOSSIER DI VALUTAZIONE ANALITICA", 105, 60, null, null, "center");
            
            doc.setFontSize(11);
            doc.setFillColor(240, 240, 240);
            doc.rect(15, 65, 180, 25, 'F');
            
            doc.text(`Alunna in valutazione:`, 20, 72);
            doc.setFont("helvetica", "normal");
            doc.text(`${studente} (Classe ${classe} - Indirizzo Sistema Moda)`, 65, 72);
            
            doc.setFont("helvetica", "bold");
            doc.text(`Azienda (Brand):`, 20, 80);
            doc.setFont("helvetica", "normal");
            doc.text(`${gruppo}`, 65, 80);
            
            doc.setFont("helvetica", "bold");
            doc.text(`Team di Lavoro:`, 20, 88);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(9);
            doc.text(datiGruppo.membri.join(", "), 65, 88, {maxWidth: 125});

            // SINTESI PROGETTO
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(mainColor[0], mainColor[1], mainColor[2]);
            doc.text("SINTESI DEL PROGETTO AZIENDALE", 15, 105);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(9);
            
            doc.text(`Motto: "${datiGruppo.slogan}"`, 15, 112);
            doc.text(`Missione:`, 15, 118);
            doc.text(datiGruppo.mission, 35, 118, {maxWidth: 160});
            doc.text(`Target Cliente:`, 15, 128);
            doc.text(datiGruppo.client, 42, 128, {maxWidth: 153});

            // --- GRIGLIA 1: ED CIVICA ---
            doc.autoTable({
                startY: 140,
                head: [['Sezione 1: Educazione Civica e Sicurezza Informatica', 'Descrittori di Valutazione Rigida', 'Voto']],
                body: [
                    ['Tutela Privacy e Normative', 'Lo studente rispetta e applica correttamente i principi del GDPR. Dimostra consapevolezza nell\'uso dei dati personali propri e dei clienti dell\'azienda.', vCivica],
                    ['Gestione Rischi Cyber', 'Lo studente riconosce, analizza e previene minacce informatiche (virus, malware, phishing). Applica procedure di sicurezza a tutela degli asset digitali del Brand.', vCivica],
                    ['Uso Consapevole Social', 'Lo studente struttura campagne social (TikTok/Instagram) nel rispetto del copyright, evitando rischi di reputazione online e analizzando l\'algoritmo in modo etico.', vCivica]
                ],
                theme: 'grid',
                headStyles: { fillColor: mainColor, textColor: 255 },
                columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 105 }, 2: { cellWidth: 25, halign: 'center', fontStyle: 'bold', fontSize: 12 } }
            });

            // --- GRIGLIA 2: WORD ---
            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 10,
                head: [['Sezione 2: Elaborazione Testi (Word)', 'Descrittori di Valutazione Rigida', 'Voto']],
                body: [
                    ['Impaginazione e Stili', 'Lo studente rispetta i vincoli di impaginazione. Applica stili coerenti per titoli e paragrafi, garantendo leggibilità e un layout estetico adatto a un dossier di moda.', vWord],
                    ['Inserimento Elementi', 'Lo studente gestisce correttamente l\'inserimento di immagini (Moodboard/Bozzetti), formattazione delle tabelle e allineamenti, senza sbavature di layout.', vWord]
                ],
                theme: 'grid',
                headStyles: { fillColor: mainColor, textColor: 255 },
                columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 105 }, 2: { cellWidth: 25, halign: 'center', fontStyle: 'bold', fontSize: 12 } }
            });

            // --- PAGINA 2: EXCEL, PPT, SITES ---
            doc.addPage();
            
            doc.autoTable({
                startY: 20,
                head: [['Sezione 3: Foglio di Calcolo (Excel)', 'Descrittori di Valutazione Rigida', 'Voto']],
                body: [
                    ['Struttura Magazzino', 'Lo studente organizza i dati logistici ed economici dell\'azienda in modo logico. Rispetta la separazione tra campi testuali e numerici.', vExcel],
                    ['Formule e Funzioni', 'Lo studente applica accuratamente funzioni di calcolo, somme automatiche, sconti e analisi dei costi, garantendo il controllo di gestione del brand.', vExcel],
                    ['Grafica Condizionale', 'Lo studente utilizza la formattazione condizionale per evidenziare stock in esaurimento o margini di profitto, elaborando grafici chiari e professionali.', vExcel]
                ],
                theme: 'grid',
                headStyles: { fillColor: mainColor, textColor: 255 },
                columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 105 }, 2: { cellWidth: 25, halign: 'center', fontStyle: 'bold', fontSize: 12 } }
            });

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 10,
                head: [['Sezione 4: Presentazione (PowerPoint)', 'Descrittori di Valutazione Rigida', 'Voto']],
                body: [
                    ['Design e Storytelling', 'Lo studente bilancia perfettamente testi e immagini. Progetta diapositive armoniose che esaltano l\'identità del brand (Color palette coerente col Moodboard).', vPPT],
                    ['Animazioni e Tecnica', 'Lo studente gestisce transizioni sobrie e professionali. Inserisce collegamenti ipertestuali e multimedialità funzionali alla presentazione del prodotto.', vPPT]
                ],
                theme: 'grid',
                headStyles: { fillColor: mainColor, textColor: 255 },
                columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 105 }, 2: { cellWidth: 25, halign: 'center', fontStyle: 'bold', fontSize: 12 } }
            });

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 10,
                head: [['Sezione 5: Web Design (Google Sites)', 'Descrittori di Valutazione Rigida', 'Voto']],
                body: [
                    ['Architettura Info', 'Lo studente progetta una navigazione intuitiva (Home, Chi Siamo, Collezione). Struttura l\'alberatura del sito simulando un reale e-commerce/vetrina di moda.', vSites],
                    ['UX e Responsività', 'Lo studente ottimizza l\'interfaccia garantendo leggibilità. Integra correttamente form di contatto, mappe e media nel rispetto delle licenze d\'uso.', vSites]
                ],
                theme: 'grid',
                headStyles: { fillColor: mainColor, textColor: 255 },
                columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 105 }, 2: { cellWidth: 25, halign: 'center', fontStyle: 'bold', fontSize: 12 } }
            });

            // --- PAGINA 3: RIEPILOGO, TABELLA CONVERSIONE, FIRME ---
            doc.addPage();
            
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("RIEPILOGO VALUTAZIONE FINALE", 105, 20, null, null, "center");

            // Calcolo Media
            const mediaRaw = (parseFloat(vCivica) + parseFloat(vWord) + parseFloat(vExcel) + parseFloat(vPPT) + parseFloat(vSites)) / 5;
            const votoFinale = calcolaFascia(mediaRaw);

            doc.autoTable({
                startY: 30,
                head: [['Sezione Valutata', 'Punteggio Parziale (Decimi)']],
                body: [
                    ['Ed. Civica e Sicurezza Informatica', vCivica],
                    ['Elaborazione Testi (Word)', vWord],
                    ['Foglio di Calcolo (Excel)', vExcel],
                    ['Presentazione (PowerPoint)', vPPT],
                    ['Web Design (Google Sites)', vSites],
                    [{content: 'MEDIA ARITMETICA PONDERATA:', styles: {fontStyle: 'bold', halign: 'right'}}, {content: mediaRaw.toFixed(2), styles: {fontStyle: 'bold'}}],
                ],
                theme: 'grid',
                headStyles: { fillColor: [0, 0, 0], textColor: 255, halign: 'center' },
                columnStyles: { 0: { cellWidth: 120 }, 1: { cellWidth: 60, halign: 'center', fontSize: 12 } }
            });

            // QUADRO VOTO FINALE
            doc.setDrawColor(0);
            doc.setLineWidth(1);
            doc.rect(15, doc.lastAutoTable.finalY + 10, 180, 25);
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("VOTO FINALE DEL PROGETTO:", 25, doc.lastAutoTable.finalY + 26);
            doc.setFontSize(22);
            doc.setTextColor(150, 0, 0); // Rosso/Bordeaux per far risaltare il voto
            doc.text(`${votoFinale} / 10`, 130, doc.lastAutoTable.finalY + 27);
            doc.setTextColor(0, 0, 0);

            // Tabella di Conversione
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("Tabella Ufficiale di Conversione Punteggio/Voto:", 15, doc.lastAutoTable.finalY + 50);
            
            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 55,
                head: [['Fascia di Punteggio (p)', 'Voto Assegnato', 'Fascia di Punteggio (p)', 'Voto Assegnato']],
                body: [
                    ['0 ≤ p < 3,70', '3', '6,70 ≤ p < 7,70', '7'],
                    ['3,70 ≤ p < 4,70', '4', '7,70 ≤ p < 8,70', '8'],
                    ['4,70 ≤ p < 5,70', '5', '8,70 ≤ p < 9,70', '9'],
                    ['5,70 ≤ p < 6,70', '6', '9,70 ≤ p ≤ 10', '10']
                ],
                theme: 'plain',
                styles: { fontSize: 8, cellPadding: 2, lineColor: [200, 200, 200], lineWidth: 0.1 },
                headStyles: { fillColor: [240, 240, 240], textColor: 0, fontStyle: 'bold' }
            });

            // Firme
            const finalY = doc.lastAutoTable.finalY + 30;
            const dataOggi = new Date().toLocaleDateString('it-IT');
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text(`Seregno, ${dataOggi}`, 15, finalY);

            doc.text("Il Docente di Teoria", 40, finalY + 15, null, null, "center");
            doc.text("Prof. Giuseppe Borzumati", 40, finalY + 30, null, null, "center");
            doc.line(15, finalY + 25, 65, finalY + 25);

            doc.text("Il Docente ITP Laboratorio", 150, finalY + 15, null, null, "center");
            doc.text("Prof.ssa Regina Anzalone", 150, finalY + 30, null, null, "center");
            doc.line(120, finalY + 25, 180, finalY + 25);

            // Salvataggio
            const nomeFile = `Dossier_Valutazione_${studente.replace(/\s+/g, '_')}_${gruppo.replace(/\s+/g, '_')}.pdf`;
            doc.save(nomeFile);
        }
    </script>
</body>
</html>
